<style>
:root{--green:#4A7C59;--gl:#6aab7a;--gd:#2a4a32;--bg:#0f1a0f;--bg2:#162016;--bg3:#1e2e1e;--card:#1a261a;--bdr:#2a3e2a;--text:#e8f0e8;--mut:#7a997a;--acc:#a8e6b8;--red:#e06060;--yel:#e0c060;--gold:#f0c040;--ora:#e08840;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:16px 20px 12px;position:sticky;top:0;z-index:100;}

.tabs{display:flex;gap:6px;padding:14px 20px;overflow-x:auto;scrollbar-width:none;background:var(--bg2);border-bottom:1px solid var(--bdr);}

.tab{flex-shrink:0;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:var(--bg3);color:var(--mut);transition:all 0.2s;}

.ds{font-size:12px;color:var(--mut);margin-bottom:20px;text-transform:uppercase;letter-spacing:1px;}
.slbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--mut);margin:24px 0 10px;border-left:3px solid var(--green);padding-left:8px;}
.ecard{background:var(--card);border:1px solid var(--bdr);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color 0.2s;}

.hact{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr);}
.hsavebtn{background:var(--green);color:white;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;flex:1;}

.bkbtn{background:var(--bg3);color:var(--text);border:1px solid var(--bdr);border-radius:8px;padding:10px 16px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;flex:1;}
.empty{text-align:center;color:var(--mut);padding:40px 20px;font-size:14px;}
.empi{font-size:40px;margin-bottom:12px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:white;padding:10px 24px;border-radius:50px;font-size:14px;font-weight:500;opacity:0;transition:all 0.3s;z-index:300;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.gld{background:var(--gold);color:#1a1000;}
</style>

var VT={"Pecho":12,"Espalda":16,"Biceps":8,"Triceps":8,"Hombro":14,"Cuadriceps":8,"Posterior":8,"Gemelos":8,"Abdominales":12};
var EM={"Pecho plano con barra":"Pecho","Pecho plano con mancuerna":"Pecho","Pecho inclinado con mancuerna":"Pecho","Pecho inclinado con barra":"Pecho","Dominadas":"Espalda","Remo con barra":"Espalda","Remo unilateral":"Espalda","Biceps banco inclinado":"Biceps","Biceps mancuerna normal":"Biceps","Biceps con barra":"Biceps","Triceps trasnuca":"Triceps","Press frances":"Triceps","Extension de triceps":"Triceps","Press militar":"Hombro","Hombro posterior":"Hombro","Vuelos laterales":"Hombro","Trapecio":"Hombro","Sentadilla":"Cuadriceps","Sentadilla bulgara":"Cuadriceps","Peso muerto convencional":"Posterior","Peso muerto rumano":"Posterior","Gemelos con barra en escalon":"Gemelos","Colgados en barra":"Abdominales","Hachazo oblicuo en polea":"Abdominales"};

var TABS=[{k:"Torso 1",l:"Torso 1"},{k:"Torso 2",l:"Torso 2"},{k:"Piernas 1",l:"Piernas 1"},{k:"Piernas 2",l:"Piernas 2"},{k:"hist",l:"Historial"},{k:"prog",l:"Progreso"},{k:"stats",l:"Habitos"},{k:"body",l:"Peso"}];
var WDS=["Torso 1","Torso 2","Piernas 1","Piernas 2"];
var SEM_TARGET=4; // sesiones objetivo por semana
var cDay="Torso 1",cView="workout",charts={},doneChk={},extraS={},asT=null;

/* ---------- fechas (SIEMPRE hora local, nunca UTC) ---------- */
function fmtD(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function ld(){return fmtD(new Date());}
function parseD(s){var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function wkStart(dstr){var d=parseD(dstr);var g=(d.getDay()+6)%7;d.setDate(d.getDate()-g);return fmtD(d);} // lunes

/* ---------- storage v2: clave = "fecha|rutina" ---------- */
function migrate(){
  if(localStorage.getItem("mh2")!==null)return;
  var old={};try{old=JSON.parse(localStorage.getItem("mh")||"{}");}catch(e){old={};}
  var nh={};
  Object.keys(old).forEach(function(date){
    var s=old[date];if(!s||typeof s!=="object")return;
    var day=s._day||guessDay(s);
    var k=date+"|"+day,dst={};
    Object.keys(s).forEach(function(x){if(x.charAt(0)!=="_")dst[x]=s[x];});
    if(Object.keys(dst).length)nh[k]=dst;
  });
  localStorage.setItem("mh2",JSON.stringify(nh));
  // "mh" viejo se deja intacto como respaldo extra
}
function guessDay(s){
  var best="Torso 1",bc=-1;
  Object.keys(R).forEach(function(dk){
    var names={};R[dk].sections.forEach(function(sec){sec.exercises.forEach(function(e){names[e.name]=1;});});
    var c=0;Object.keys(s).forEach(function(n){if(names[n])c++;});
    if(c>bc){bc=c;best=dk;}
  });
  return best;
}
function gH(){try{return JSON.parse(localStorage.getItem("mh2")||"{}");}catch(e){return {};}}
function sH(h){localStorage.setItem("mh2",JSON.stringify(h));}
function gBW(){try{return JSON.parse(localStorage.getItem("mbw")||"[]");}catch(e){return [];}}
function sBW(b){localStorage.setItem("mbw",JSON.stringify(b));}
function kDate(k){return k.split("|")[0];}
function kDay(k){return k.split("|")[1]||"";}
function exKeys(sess){return Object.keys(sess).filter(function(x){return x.charAt(0)!=="_";});}
function pw(v){if(!v)return 0;return parseFloat(v.toString().replace(",","."))||0;}
function slotMap(series){ // {slot: entrada}; datos viejos sin "i" usan la posicion
  var m={};(series||[]).forEach(function(s,si){m[s.i!==undefined?s.i:si]=s;});return m;
}
function maxSlot(series){var mx=-1;(series||[]).forEach(function(s,si){var i=s.i!==undefined?s.i:si;if(i>mx)mx=i;});return mx;}

function getPR(n){
  var best=0,h=gH();
  Object.keys(h).forEach(function(k){
    var s=h[k];
    if(s[n]&&Array.isArray(s[n]))s[n].forEach(function(r){var w=pw(r.weight);if(w>best)best=w;});
  });
  return best;
}

function getLS(dk){
  var h=gH(),today=ld();
  var keys=Object.keys(h).filter(function(k){return kDay(k)===dk;}).sort().reverse();
  var notToday=keys.filter(function(k){return kDate(k)!==today;});
  var use=notToday.length?notToday:keys;
  return use.length?{date:kDate(use[0]),data:h[use[0]]}:null;
}

/* ---------- tabs ---------- */
function rTabs(){
  document.getElementById("tabs").innerHTML=TABS.map(function(t){
    var active=(cView==="workout"&&t.k===cDay)||(cView!=="workout"&&t.k===cView);
    return '<div class="tab'+(active?" active":"")+'" onclick="selTab(\''+t.k+'\')">'+t.l+"</div>";
  }).join("");
}

function selTab(k){
  if(cView==="workout")autoSave(); // flush antes de irse
  dCharts();
  document.getElementById("wkout").classList.remove("hide");
  ["vHist","vProg","vStats","vBody"].forEach(function(v){document.getElementById(v).classList.remove("on");});
  if(WDS.indexOf(k)>=0){
    cView="workout";cDay=k;
    localStorage.setItem("mday",k);
    document.getElementById("savebtn").style.display="block";
    rWorkout();
  } else {
    cView=k;
    document.getElementById("wkout").classList.add("hide");
    document.getElementById("savebtn").style.display="none";
    if(k==="hist"){document.getElementById("vHist").classList.add("on");rHist();}
    if(k==="prog"){document.getElementById("vProg").classList.add("on");rProg();}
    if(k==="stats"){document.getElementById("vStats").classList.add("on");rStats();}
    if(k==="body"){document.getElementById("vBody").classList.add("on");rBody();}
  }
  rTabs();
}

function dCharts(){Object.values(charts).forEach(function(c){try{c.destroy();}catch(e){}});charts={};}

/* ---------- vista entrenamiento ---------- */
function eachEx(dk,fn){var i=0;R[dk].sections.forEach(function(sec){sec.exercises.forEach(function(ex){fn(ex,i);i++;});});}
function exByIdx(dk,idx){var found=null;eachEx(dk,function(ex,i){if(i===idx)found=ex;});return found;}

function rWorkout(){
  doneChk={};extraS={};
  var h=gH(),key=ld()+"|"+cDay,sess=h[key]||null;
  if(sess){
    if(sess._extra)Object.keys(sess._extra).forEach(function(i){extraS[i]=sess._extra[i];});
    if(sess._checks)Object.keys(sess._checks).forEach(function(c){doneChk[c]=true;});
  }
  var day=R[cDay],last=getLS(cDay);
  var html='<div class="dh">'+cDay.toUpperCase()+'</div>';
  html+='<div class="ds">'+day.sections.map(function(s){return s.name;}).join(" &middot; ")+"</div>";
  var exIdx=0;
  day.sections.forEach(function(sec){
    html+='<div class="slbl">'+sec.name+"</div>";
    sec.exercises.forEach(function(ex){
      var idx=exIdx++,pr=getPR(ex.name);
      var lastData=last&&last.data[ex.name]?last.data[ex.name]:null;
      // si hay series guardadas hoy en slots mas alla de la base, ajustar extra
      if(sess&&sess[ex.name]){
        var need=maxSlot(sess[ex.name])+1-ex.series;
        if(need>(extraS[idx]||0))extraS[idx]=need;
      }
      html+=bldCard(ex,idx,pr,lastData,extraS[idx]||0);
    });
  });
  document.getElementById("wkout").innerHTML=html;
  fillToday(sess);
}

function fillToday(sess){
  if(!sess)return;
  eachEx(cDay,function(ex,idx){
    var series=sess[ex.name];
    if(series){
      series.forEach(function(s,pos){
        var si=s.i!==undefined?s.i:pos;
        var we=document.getElementById("w_"+idx+"_"+si);
        var re=document.getElementById("r_"+idx+"_"+si);
        if(we&&s.weight&&s.weight!=="0")we.value=s.weight;
        if(re&&s.reps&&s.reps!=="0")re.value=s.reps;
        if(s.ds){
          var dwe=document.getElementById("dsw_"+idx+"_"+si);
          var dre=document.getElementById("dsr_"+idx+"_"+si);
          if(dwe)dwe.value=s.ds.weight;
          if(dre)dre.value=s.ds.reps;
          var dsRow=document.getElementById("ds_"+idx+"_"+si);
          var dsBtn=document.getElementById("dsb_"+idx+"_"+si);
          if(dsRow)dsRow.style.display="flex";
          if(dsBtn)dsBtn.classList.add("on");
        }
      });
    }
  });
  // restaurar tildes
  Object.keys(doneChk).forEach(function(c){
    if(!doneChk[c])return;
    var e=document.getElementById("chk_"+c);
    if(e)e.classList.add("done");
  });
  eachEx(cDay,function(ex,idx){updComplete(idx,ex);});
}

function srowHtml(ex,idx,si,extra,hint){
  var rows='<div class="sblk" id="sb_'+idx+"_"+si+'">';
  rows+='<div class="srow">';
  rows+='<div class="snum'+(extra?" ex":"")+'">'+(extra?"+":(si+1))+"</div>";
  rows+='<div class="sig">';
  rows+='<input class="si" type="text" inputmode="decimal" placeholder="'+(hint||(ex.bw?"PC":"kg"))+'" id="w_'+idx+"_"+si+'" oninput="chkPR('+idx+",'"+ex.name+"')\">";
  rows+='<span class="slb">kg</span>';
  rows+='<input class="si" type="text" inputmode="numeric" placeholder="reps" id="r_'+idx+"_"+si+'" oninput="autoSaveD()">';
  rows+='<span class="slb">reps</span>';
  rows+="</div>";
  rows+='<button class="dsbtn" id="dsb_'+idx+"_"+si+'" onclick="tDS('+idx+","+si+')">DS</button>';
  rows+='<div class="schk" id="chk_'+idx+"_"+si+'" onclick="mSerie('+idx+","+si+')">&#10003;</div>';
  rows+="</div>";
  if(hint)rows+='<div class="lhint">Ultima vez: <span>'+hint+"</span></div>";
  rows+='<div class="dsrow" id="ds_'+idx+"_"+si+'" style="display:none">';
  rows+='<div class="dslb">DS</div>';
  rows+='<div class="sig">';
  rows+='<input class="si" type="text" inputmode="decimal" placeholder="kg" id="dsw_'+idx+"_"+si+'" oninput="autoSaveD()">';
  rows+='<span class="slb">kg</span>';
  rows+='<input class="si" type="text" inputmode="numeric" placeholder="reps" id="dsr_'+idx+"_"+si+'" oninput="autoSaveD()">';
  rows+='<span class="slb">reps</span>';
  rows+="</div></div></div>";
  return rows;
}

function bldCard(ex,idx,pr,lastData,nExtra){
  var rows="";
  var total=ex.series+nExtra;
  var lmap=slotMap(lastData);
  for(var si=0;si<total;si++){
    var ls=lmap[si]||null;
    var hint=ls?(ex.bw&&pw(ls.weight)===0?"PC x "+ls.reps+" reps":ls.weight+"kg x "+ls.reps+" reps"):null;
    rows+=srowHtml(ex,idx,si,si>=ex.series,hint);
  }
  var card='<div class="ecard" id="card_'+idx+'">';
  card+='<div class="ehdr" onclick="tEx('+idx+')">';
  card+='<div class="cdot"></div>';
  card+='<div style="flex:1"><div class="ename">'+ex.name+(pr>0?'<span class="prbdg">PR '+pr+'kg</span>':"")+"</div>";
  card+='<div class="emeta">'+ex.series+" series &middot; "+ex.reps+" reps"+(ex.note?" &middot; "+ex.note:"")+"</div></div>";
  card+='<div class="etgl">&#9662;</div></div>';
  card+='<div class="scon" id="sc_'+idx+'">'+rows;
  if(lastData)card+='<button class="cpybtn" onclick="cpLast('+idx+')">&#8635; Copiar ultima sesion</button>';
  card+='<button class="addbtn" onclick="addExtra('+idx+')">+ Serie extra</button>';
  card+="</div></div>";
  return card;
}

function tEx(i){document.getElementById("card_"+i).classList.toggle("open");}

function tDS(i,si){
  var d=document.getElementById("ds_"+i+"_"+si),b=document.getElementById("dsb_"+i+"_"+si);
  var h=d.style.display==="none";
  d.style.display=h?"flex":"none";
  b.classList.toggle("on",h);
  autoSaveD();
}

function cpLast(idx){
  var ex=exByIdx(cDay,idx);if(!ex)return;
  var last=getLS(cDay);
  if(!last||!last.data[ex.name])return;
  var series=last.data[ex.name];
  // asegurar filas suficientes hasta el slot mas alto
  var need=maxSlot(series)+1-(ex.series+(extraS[idx]||0));
  for(var n=0;n<need;n++)addExtra(idx,true);
  series.forEach(function(s,pos){
    var si=s.i!==undefined?s.i:pos;
    var we=document.getElementById("w_"+idx+"_"+si);
    var re=document.getElementById("r_"+idx+"_"+si);
    if(we&&!we.value&&s.weight&&s.weight!=="0")we.value=s.weight;
    if(re&&!re.value&&s.reps&&s.reps!=="0")re.value=s.reps;
    if(s.ds){
      var dsRow=document.getElementById("ds_"+idx+"_"+si);
      var dsBtn=document.getElementById("dsb_"+idx+"_"+si);
      var dwe=document.getElementById("dsw_"+idx+"_"+si);
      var dre=document.getElementById("dsr_"+idx+"_"+si);
      if(dsRow)dsRow.style.display="flex";
      if(dsBtn)dsBtn.classList.add("on");
      if(dwe&&!dwe.value)dwe.value=s.ds.weight;
      if(dre&&!dre.value)dre.value=s.ds.reps;
    }
  });
  chkPR(idx,ex.name);
  toast("Copiado de la ultima sesion");
}

function addExtra(idx,silent){
  var ex=exByIdx(cDay,idx);if(!ex)return;
  extraS[idx]=(extraS[idx]||0)+1;
  var si=ex.series+(extraS[idx]-1);
  var blk=document.createElement("div");
  blk.innerHTML=srowHtml(ex,idx,si,true,null);
  var sc=document.getElementById("sc_"+idx);
  var anchor=sc.querySelector(".cpybtn")||sc.querySelector(".addbtn");
  sc.insertBefore(blk.firstElementChild,anchor);
  if(!silent)autoSaveD();
}

function updComplete(idx,ex){
  ex=ex||exByIdx(cDay,idx);if(!ex)return;
  var all=true;
  for(var i=0;i<ex.series;i++){if(!doneChk[idx+"_"+i]){all=false;break;}}
  document.getElementById("card_"+idx).classList.toggle("complete",all);
}

function mSerie(idx,si){
  var key=idx+"_"+si;
  doneChk[key]=!doneChk[key];
  if(!doneChk[key])delete doneChk[key];
  document.getElementById("chk_"+idx+"_"+si).classList.toggle("done",!!doneChk[key]);
  updComplete(idx);
  autoSave();
}

function chkPR(idx,name){
  var pr=getPR(name),mx=0;
  for(var si=0;si<40;si++){var e=document.getElementById("w_"+idx+"_"+si);if(!e)break;var v=pw(e.value);if(v>mx)mx=v;}
  var card=document.getElementById("card_"+idx);
  if(mx>pr&&pr>0){
    if(!card.classList.contains("pr-alert")){card.classList.add("pr-alert");toast("Nuevo record personal!",true);}
  } else card.classList.remove("pr-alert");
  autoSaveD();
}

/* ---------- guardado ---------- */
function autoSaveD(){clearTimeout(asT);asT=setTimeout(autoSave,350);}

function autoSave(){
  if(cView!=="workout")return;
  clearTimeout(asT);
  var h=gH(),key=ld()+"|"+cDay;
  var sess={};
  eachEx(cDay,function(ex,idx){
    var series=[],total=ex.series+(extraS[idx]||0);
    for(var si=0;si<total;si++){
      var we=document.getElementById("w_"+idx+"_"+si);
      var re=document.getElementById("r_"+idx+"_"+si);
      var dwe=document.getElementById("dsw_"+idx+"_"+si);
      var dre=document.getElementById("dsr_"+idx+"_"+si);
      var wv=we?we.value.replace(",","."):"";
      var rv=re?re.value:"";
      if(wv||rv){
        var entry={weight:wv||"0",reps:rv||"0",i:si};
        if(dwe&&dre&&(dwe.value||dre.value))entry.ds={weight:dwe.value.replace(",","."),reps:dre.value};
        series.push(entry);
      }
    }
    if(series.length)sess[ex.name]=series;
  });
  var ck={};Object.keys(doneChk).forEach(function(c){if(doneChk[c])ck[c]=1;});
  var exd={};Object.keys(extraS).forEach(function(i){if(extraS[i]>0)exd[i]=extraS[i];});
  var hasData=Object.keys(sess).length>0||Object.keys(ck).length>0;
  if(hasData){
    if(Object.keys(ck).length)sess._checks=ck;
    if(Object.keys(exd).length)sess._extra=exd;
    h[key]=sess;
  } else delete h[key];
  sH(h);
}

function saveSession(){autoSave();toast("Sesion guardada");}

/* ---------- progreso ---------- */
function e1rm(w,r){if(w<=0)return 0;if(r<=1)return w;return Math.round(w*(1+r/30)*10)/10;}

function rProg(){
  var allEx=new Set();
  Object.values(R).forEach(function(d){d.sections.forEach(function(s){s.exercises.forEach(function(e){allEx.add(e.name);});});});
  var opts='<option value="">Selecciona ejercicio...</option>';
  allEx.forEach(function(n){opts+='<option value="'+n+'">'+n+"</option>";});
  document.getElementById("vProg").innerHTML='<div class="slbl">Progreso por ejercicio</div><select class="psel" id="psel" onchange="rProgChart()">'+opts+"</select><div id='pca'></div><div id='pcmp'></div>";
}

function rProgChart(){
  var name=document.getElementById("psel").value;
  var ca=document.getElementById("pca"),cmp=document.getElementById("pcmp");
  if(!name){ca.innerHTML="";cmp.innerHTML="";return;}
  var h=gH(),entries=[];
  Object.keys(h).sort().forEach(function(key){
    var sess=h[key];
    if(sess[name]){
      var mx=0,tr=0,ton=0,rm=0;
      sess[name].forEach(function(s){
        var w=pw(s.weight),r=parseInt(s.reps)||0;
        if(w>mx)mx=w;
        tr+=r;ton+=w*r;
        var e=e1rm(w,r);if(e>rm)rm=e;
        if(s.ds){var dw=pw(s.ds.weight),dr=parseInt(s.ds.reps)||0;tr+=dr;ton+=dw*dr;}
      });
      if(mx>0||tr>0)entries.push({date:kDate(key),mx:mx,rm:rm,ton:Math.round(ton),series:sess[name],tr:tr});
    }
  });
  if(!entries.length){ca.innerHTML='<div class="empty"><div class="empi">&#127947;</div>Sin registros</div>';cmp.innerHTML="";return;}
  var hiHtml=entries.slice().reverse().map(function(e){
    var wstr=e.mx>0?e.mx+"kg":"PC";
    var vol=e.ton>0?" &middot; "+e.ton+"kg vol":"";
    return "<div class='hi'><div><div class='hdate'>"+e.date+"</div><div style='font-size:11px;color:var(--mut)'>"+e.series.length+" series &middot; "+e.tr+" reps"+vol+"</div></div><div class='hdata'>"+wstr+"</div></div>";
  }).join("");
  ca.innerHTML='<div class="chrt"><div class="chtl">Peso maximo y 1RM estimado (kg)</div><canvas id="pc" height="180"></canvas></div><div class="chrt"><div class="chtl">Tonelaje por sesion (kg)</div><canvas id="tc" height="150"></canvas></div><div class="slbl">Historial</div>'+hiHtml;
  var valid=entries.filter(function(e){return e.mx>0;});
  if(valid.length>0){
    if(charts.p)try{charts.p.destroy();}catch(e){}
    charts.p=new Chart(document.getElementById("pc").getContext("2d"),{
      type:"line",
      data:{labels:valid.map(function(e){return e.date.slice(5);}),datasets:[
        {label:"Peso max",data:valid.map(function(e){return e.mx;}),borderColor:"#6aab7a",backgroundColor:"rgba(106,171,122,0.15)",borderWidth:2.5,pointBackgroundColor:"#6aab7a",pointRadius:4,tension:0.3,fill:true},
        {label:"1RM est.",data:valid.map(function(e){return e.rm;}),borderColor:"#f0c040",borderDash:[5,4],borderWidth:2,pointBackgroundColor:"#f0c040",pointRadius:3,tension:0.3,fill:false}
      ]},
      options:{responsive:true,plugins:{legend:{display:true,labels:{color:"#7a997a",font:{size:11},boxWidth:16}}},scales:{x:{ticks:{color:"#7a997a",font:{size:11}},grid:{color:"#2a3e2a"}},y:{ticks:{color:"#7a997a",font:{size:11}},grid:{color:"#2a3e2a"}}}}
    });
  }
  var vton=entries.filter(function(e){return e.ton>0;});
  if(vton.length>0){
    if(charts.t)try{charts.t.destroy();}catch(e){}
    charts.t=new Chart(document.getElementById("tc").getContext("2d"),{
      type:"bar",
      data:{labels:vton.map(function(e){return e.date.slice(5);}),datasets:[{data:vton.map(function(e){return e.ton;}),backgroundColor:"rgba(106,171,122,0.5)",borderColor:"#6aab7a",borderWidth:1.5,borderRadius:4}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#7a997a",font:{size:11}},grid:{display:false}},y:{ticks:{color:"#7a997a",font:{size:11}},grid:{color:"#2a3e2a"}}}}
    });
  }
  if(entries.length>=2){
    var last=entries[entries.length-1],prev=entries[entries.length-2];
    var diff=Math.round((last.mx-prev.mx)*10)/10;
    var dc=diff>0?"up":diff<0?"dn":"eq";
    var dt=diff>0?"&#9650; +"+diff+"kg":diff<0?"&#9660; "+diff+"kg":"= Sin cambio";
    var rmStr=function(e){return e.rm>0?'<div style="font-size:11px;color:var(--mut);margin-top:2px">1RM est: '+e.rm+'kg</div>':"";};
    cmp.innerHTML='<div class="slbl">Comparacion ultimas 2 sesiones</div><div class="cgrid"><div class="ccard"><div class="cdate">'+prev.date+'</div><div class="cval">'+(prev.mx>0?prev.mx+"kg":"PC")+'</div>'+rmStr(prev)+'<div style="font-size:11px;color:var(--mut)">'+prev.series.length+' series</div></div><div class="ccard"><div class="cdate">'+last.date+' <span style="color:var(--gl);font-size:10px">ULTIMA</span></div><div class="cval">'+(last.mx>0?last.mx+"kg":"PC")+'</div>'+rmStr(last)+'<div class="cdiff '+dc+'">'+dt+"</div></div></div>";
  } else cmp.innerHTML="";
}

/* ---------- habitos ---------- */
function gWVol(){
  var h=gH(),vol={};
  Object.keys(VT).forEach(function(k){vol[k]=0;});
  var wsStr=wkStart(ld());
  Object.keys(h).forEach(function(key){
    if(kDate(key)>=wsStr){
      exKeys(h[key]).forEach(function(n){
        var m=EM[n];if(m&&vol[m]!==undefined)vol[m]+=h[key][n].length;
      });
    }
  });
  return vol;
}

function rStats(){
  var h=gH(),keys=Object.keys(h).sort();
  var total=keys.length;
  var dc={"Torso 1":0,"Torso 2":0,"Piernas 1":0,"Piernas 2":0};
  var byDate={};
  keys.forEach(function(k){
    var day=kDay(k);if(dc[day]!==undefined)dc[day]++;
    var d=kDate(k);if(!byDate[d])byDate[d]=[];byDate[d].push(day);
  });
  var maxC=Math.max.apply(null,Object.values(dc).concat([1]));
  // semanas: sesiones por semana (lunes a domingo)
  var wk={};
  keys.forEach(function(k){var w=wkStart(kDate(k));wk[w]=(wk[w]||0)+1;});
  var cw=wkStart(ld());
  var thisW=wk[cw]||0;
  var streak=0;
  var cur=parseD(cw);
  if(thisW>=SEM_TARGET){streak++;}
  cur.setDate(cur.getDate()-7);
  while(true){
    var wkey=fmtD(cur);
    if((wk[wkey]||0)>=SEM_TARGET){streak++;cur.setDate(cur.getDate()-7);}
    else break;
  }
  var today=new Date();
  var d35=[];
  for(var j=34;j>=0;j--){var d=new Date(today);d.setDate(today.getDate()-j);var k=fmtD(d);d35.push({k:k,n:d.getDate(),tp:byDate[k]?byDate[k][0]:null});}
  var dow=["D","L","M","M","J","V","S"],sdow=parseD(d35[0].k).getDay();
  var wv=gWVol();
  var html='<div class="slbl">Constancia</div>';
  html+='<div class="sgrid">';
  html+='<div class="scard"><div class="sval">'+total+'</div><div class="slb2">Sesiones totales</div></div>';
  html+='<div class="scard"><div class="sval">'+thisW+'/'+SEM_TARGET+'</div><div class="slb2">Esta semana</div></div>';
  html+='<div class="scard"><div class="sval">'+streak+'</div><div class="slb2">Semanas cumplidas seguidas</div></div>';
  html+='</div>';
  html+='<div class="slbl">Ultimos 35 dias</div>';
  html+='<div class="mlbl">'+dow.map(function(l){return '<div class="ml">'+l+"</div>";}).join("")+"</div>";
  html+='<div class="hgrid">';
  for(var x=0;x<sdow;x++)html+="<div></div>";
  d35.forEach(function(d){html+='<div class="hday'+(d.tp?" tr":"")+'"><span class="hdn">'+d.n+"</span>"+(d.tp?'<span class="hdt">'+d.tp.replace(" ","").substring(0,4)+"</span>":"")+"</div>";});
  html+="</div>";
  html+='<div class="slbl">Series esta semana (desde el lunes)</div>';
  Object.keys(VT).forEach(function(muscle){
    var done=wv[muscle]||0,target=VT[muscle];
    var pct=Math.min((done/target)*100,100),ok=done>=target;
    html+='<div class="vrow"><div class="vrt"><div class="vrn">'+muscle+'</div><div class="vrc '+(ok?"ok":"lo")+'">'+done+"/"+target+' series</div></div><div class="vbw"><div class="vb '+(ok?"ok":"lo")+'" style="width:'+pct+'%"></div></div></div>';
  });
  html+='<div class="slbl">Veces por dia de rutina</div>';
  Object.keys(dc).forEach(function(day){
    var count=dc[day];
    html+='<div class="dfrow"><div style="flex:1"><div class="dfn">'+day+'</div><div class="dfbw"><div class="dfb" style="width:'+(count/maxC*100)+'%"></div></div></div><div class="dfc">'+count+"x</div></div>";
  });
  html+='<div class="slbl">Copia de seguridad</div>';
  html+='<div style="font-size:12px;color:var(--mut);margin-bottom:10px">Tus datos viven solo en este navegador. Exporta un backup cada tanto por si cambias de telefono o se borran los datos.</div>';
  html+='<div style="display:flex;gap:8px">';
  html+='<button class="hsavebtn" onclick="expData()">Exportar datos</button>';
  html+='<button class="bkbtn" onclick="document.getElementById(\'impf\').click()">Importar backup</button>';
  html+='</div>';
  document.getElementById("vStats").innerHTML=html;
}

/* ---------- backup ---------- */
function expData(){
  var payload={app:"entreno-muzio",v:2,exported:new Date().toISOString(),mh2:gH(),mbw:gBW()};
  var blob=new Blob([JSON.stringify(payload)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="entreno_backup_"+ld()+".json";
  document.body.appendChild(a);a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},1000);
  toast("Backup exportado");
}

function impData(ev){
  var file=ev.target.files[0];
  ev.target.value="";
  if(!file)return;
  var rd=new FileReader();
  rd.onload=function(){
    var data;
    try{data=JSON.parse(rd.result);}catch(e){toast("Archivo invalido");return;}
    var imp=null;
    if(data&&data.mh2)imp=data.mh2;
    else if(data&&data.mh){ // backup viejo: migrar al vuelo
      imp={};
      Object.keys(data.mh).forEach(function(date){
        var s=data.mh[date];if(!s||typeof s!=="object")return;
        var k=date+"|"+(s._day||guessDay(s)),dst={};
        Object.keys(s).forEach(function(x){if(x.charAt(0)!=="_")dst[x]=s[x];});
        if(Object.keys(dst).length)imp[k]=dst;
      });
    }
    if(!imp){toast("No parece un backup de la app");return;}
    var nSess=Object.keys(imp).length;
    if(!confirm("Importar "+nSess+" sesiones? Se combinan con las actuales (el backup pisa fechas repetidas).") )return;
    var h=gH();
    Object.keys(imp).forEach(function(k){h[k]=imp[k];});
    sH(h);
    if(data.mbw&&Array.isArray(data.mbw)){
      var bw=gBW();
      data.mbw.forEach(function(e){
        var i=bw.findIndex(function(x){return x.date===e.date;});
        if(i>=0)bw[i]=e;else bw.push(e);
      });
      bw.sort(function(a,b){return a.date.localeCompare(b.date);});
      sBW(bw);
    }
    toast("Backup importado");
    selTab(cView==="workout"?cDay:cView);
  };
  rd.readAsText(file);
}

/* ---------- peso corporal ---------- */
function rBody(){
  document.getElementById("vBody").innerHTML='<div class="slbl">Registrar peso corporal</div><div class="wrow"><input class="winp" type="text" inputmode="decimal" id="bwi" placeholder="69.5"><button class="wsbtn" onclick="saveBW()">Guardar</button></div><div id="bwca"></div><div class="slbl">Historial</div><div id="bwhi"></div>';
  rBWChart();
}

function saveBW(){
  var raw=document.getElementById("bwi").value.replace(",",".");
  var val=parseFloat(raw);
  if(!val||val<30||val>200){toast("Peso invalido");return;}
  var bw=gBW(),today=ld();
  var ei=bw.findIndex(function(e){return e.date===today;});
  if(ei>=0)bw[ei].weight=val;else bw.push({date:today,weight:val});
  bw.sort(function(a,b){return a.date.localeCompare(b.date);});
  sBW(bw);document.getElementById("bwi").value="";toast("Peso guardado");rBWChart();
}

function rBWChart(){
  var bw=gBW(),ca=document.getElementById("bwca"),hi=document.getElementById("bwhi");
  if(!bw.length){ca.innerHTML='<div class="empty"><div class="empi">&#9878;</div>Registra tu primer peso</div>';hi.innerHTML="";return;}
  ca.innerHTML='<div class="chrt"><div class="chtl">Peso corporal (kg)</div><canvas id="bwc" height="180"></canvas></div>';
  if(charts.bw)try{charts.bw.destroy();}catch(e){}
  charts.bw=new Chart(document.getElementById("bwc").getContext("2d"),{
    type:"line",
    data:{labels:bw.map(function(e){return e.date.slice(5);}),datasets:[{data:bw.map(function(e){return e.weight;}),borderColor:"#a8e6b8",backgroundColor:"rgba(168,230,184,0.15)",borderWidth:2.5,pointBackgroundColor:"#a8e6b8",pointRadius:5,tension:0.3,fill:true}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#7a997a",font:{size:11}},grid:{color:"#2a3e2a"}},y:{ticks:{color:"#7a997a",font:{size:11}},grid:{color:"#2a3e2a"}}}}
  });
  hi.innerHTML=bw.slice().reverse().map(function(e){return "<div class='hi'><div class='hdate'>"+e.date+"</div><div class='hdata'>"+e.weight+" kg</div></div>";}).join("");
}

function toast(msg,gold){
  var t=document.getElementById("toast");
  t.textContent=msg;t.className="toast on"+(gold?" gld":"");
  setTimeout(function(){t.className="toast";},2800);
}
