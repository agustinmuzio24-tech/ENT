<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Entreno">
<meta name="theme-color" content="#0f1a0f">
<title>Entreno Muzio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#4A7C59;--gl:#6aab7a;--gd:#2a4a32;--bg:#0f1a0f;--bg2:#162016;--bg3:#1e2e1e;--card:#1a261a;--bdr:#2a3e2a;--text:#e8f0e8;--mut:#7a997a;--acc:#a8e6b8;--red:#e06060;--yel:#e0c060;--gold:#f0c040;--ora:#e08840;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:16px 20px 12px;position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--gl);letter-spacing:2px;}
.dbadge{font-size:12px;color:var(--mut);background:var(--bg3);padding:4px 10px;border-radius:20px;border:1px solid var(--bdr);}
.tabs{display:flex;gap:6px;padding:14px 20px;overflow-x:auto;scrollbar-width:none;background:var(--bg2);border-bottom:1px solid var(--bdr);}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:var(--bg3);color:var(--mut);transition:all 0.2s;}
.tab.active{background:var(--green);color:white;border-color:var(--green);}
.main{padding:16px 16px 100px;}
.dh{font-family:'Bebas Neue',cursive;font-size:36px;color:var(--gl);letter-spacing:3px;margin-bottom:4px;}
.ds{font-size:12px;color:var(--mut);margin-bottom:20px;text-transform:uppercase;letter-spacing:1px;}
.slbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--mut);margin:24px 0 10px;border-left:3px solid var(--green);padding-left:8px;}
.ecard{background:var(--card);border:1px solid var(--bdr);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color 0.2s;}
.ecard.complete{border-color:var(--gd);}
.ecard.pr-alert{border-color:var(--gold);}
.ehdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;}
.ename{font-size:15px;font-weight:500;color:var(--text);flex:1;}
.emeta{font-size:12px;color:var(--mut);margin-top:2px;}
.etgl{font-size:18px;color:var(--mut);transition:transform 0.2s;margin-left:12px;}
.ecard.open .etgl{transform:rotate(180deg);}
.cdot{width:8px;height:8px;border-radius:50%;background:var(--bdr);margin-right:10px;flex-shrink:0;transition:background 0.2s;}
.ecard.complete .cdot{background:var(--gl);}
.scon{display:none;padding:0 16px 14px;flex-direction:column;gap:6px;}
.ecard.open .scon{display:flex;}
.sblk{background:var(--bg3);border-radius:8px;padding:8px 10px;}
.srow{display:flex;align-items:center;gap:8px;}
.snum{font-family:'Bebas Neue',cursive;font-size:18px;color:var(--gl);width:28px;flex-shrink:0;}
.snum.ex{color:var(--ora);}
.sig{display:flex;align-items:center;gap:6px;flex:1;}
.si{background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;padding:8px 10px;width:0;flex:1;text-align:center;outline:none;transition:border-color 0.2s;}
.si:focus{border-color:var(--green);}
.si::placeholder{color:var(--mut);font-size:11px;}
.slb{font-size:11px;color:var(--mut);text-transform:uppercase;white-space:nowrap;}
.schk{width:32px;height:32px;border-radius:8px;border:1px solid var(--bdr);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all 0.2s;flex-shrink:0;}
.schk.done{background:var(--green);border-color:var(--green);}
.lhint{font-size:11px;color:var(--mut);margin-top:4px;padding-left:36px;}
.lhint span{color:var(--gl);font-weight:500;}
.dsbtn{font-size:11px;color:var(--ora);background:transparent;border:1px solid var(--ora);border-radius:6px;padding:3px 8px;cursor:pointer;margin-left:4px;flex-shrink:0;transition:all 0.2s;}
.dsbtn.on{background:var(--ora);color:white;}
.dsrow{display:flex;align-items:center;gap:8px;margin-top:6px;padding-top:6px;border-top:1px dashed var(--bdr);}
.dslb{font-size:10px;color:var(--ora);font-weight:600;text-transform:uppercase;width:28px;flex-shrink:0;}
.addbtn{display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;border:1px dashed var(--bdr);border-radius:8px;color:var(--mut);font-size:13px;font-family:'DM Sans',sans-serif;padding:10px;cursor:pointer;margin-top:4px;width:100%;}
.prbdg{background:var(--gold);color:#1a1000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:8px;}
.rtmr{display:none;background:var(--bg);border-radius:8px;padding:10px 14px;margin-top:6px;align-items:center;justify-content:space-between;border:1px solid var(--bdr);}
.rtmr.on{display:flex;}
.tdisp{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--gl);letter-spacing:2px;}
.tlbl{font-size:11px;color:var(--mut);text-transform:uppercase;}
.tbtns{display:flex;gap:6px;}
.tbtn{background:var(--card);border:1px solid var(--bdr);border-radius:6px;color:var(--text);font-size:12px;padding:6px 10px;cursor:pointer;}
.tbtn.stop{background:var(--red);border-color:var(--red);color:white;}
.savebtn{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:white;border:none;border-radius:50px;padding:16px 48px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 8px 32px rgba(74,124,89,0.4);transition:all 0.2s;z-index:200;}
.savebtn:active{transform:translateX(-50%) scale(0.96);}
.vhide{display:none;}
.vhide.on{display:block;}
.wkout.hide{display:none;}
.psel{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:10px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;padding:12px 14px;outline:none;margin-bottom:20px;}
.chrt{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;margin-bottom:16px;}
.chtl{font-size:13px;font-weight:600;color:var(--acc);margin-bottom:14px;text-transform:uppercase;letter-spacing:1px;}
canvas{width:100%!important;}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.ccard{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:12px;}
.cdate{font-size:11px;color:var(--mut);margin-bottom:6px;}
.cval{font-size:20px;font-weight:600;color:var(--gl);}
.cdiff{font-size:12px;margin-top:4px;}
.cdiff.up{color:var(--gl);}.cdiff.dn{color:var(--red);}.cdiff.eq{color:var(--mut);}
.hi{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.hdate{font-size:12px;color:var(--mut);}
.hdata{font-size:13px;font-weight:500;}
.winp{background:var(--card);border:1px solid var(--bdr);border-radius:10px;color:var(--text);font-size:18px;font-family:'DM Sans',sans-serif;padding:12px 16px;flex:1;outline:none;text-align:center;}
.winp:focus{border-color:var(--green);}
.wrow{display:flex;gap:10px;margin-bottom:20px;}
.wsbtn{background:var(--green);color:white;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.scard{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px;}
.sval{font-family:'Bebas Neue',cursive;font-size:36px;color:var(--gl);}
.slb2{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
.hgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px;}
.hday{aspect-ratio:1;border-radius:6px;background:var(--bg3);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;}
.hday.tr{background:var(--gd);border-color:var(--green);}
.hdn{font-size:9px;color:var(--mut);}
.hdt{font-size:7px;color:var(--gl);font-weight:600;}
.mlbl{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.ml{font-size:8px;color:var(--mut);text-align:center;}
.dfrow{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.dfn{font-size:14px;font-weight:500;}
.dfc{font-family:'Bebas Neue',cursive;font-size:24px;color:var(--gl);}
.dfbw{height:4px;background:var(--bg3);border-radius:2px;margin-top:4px;}
.dfb{height:4px;background:var(--green);border-radius:2px;}
.vrow{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.vrt{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.vrn{font-size:13px;font-weight:500;}
.vrc{font-size:13px;font-weight:600;}
.vrc.ok{color:var(--gl);}.vrc.lo{color:var(--yel);}
.vbw{height:5px;background:var(--bg3);border-radius:3px;}
.vb{height:5px;border-radius:3px;}
.vb.ok{background:var(--green);}.vb.lo{background:var(--yel);}
.hsess{background:var(--card);border:1px solid var(--bdr);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.hsesshdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;}
.hsessdate{font-family:'Bebas Neue',cursive;font-size:20px;color:var(--gl);letter-spacing:1px;}
.hsessday{font-size:12px;color:var(--mut);margin-top:2px;}
.hsessbody{display:none;padding:0 16px 14px;}
.hsess.open .hsessbody{display:block;}
.hex{margin-bottom:12px;}
.hexn{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
.hsr{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.hsn{font-family:'Bebas Neue',cursive;font-size:16px;color:var(--gl);width:24px;flex-shrink:0;}
.hinp{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;padding:6px 8px;width:80px;text-align:center;outline:none;}
.hinp:focus{border-color:var(--green);}
.hact{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr);}
.hsavebtn{background:var(--green);color:white;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;flex:1;}
.hdelbtn{background:transparent;color:var(--red);border:1px solid var(--red);border-radius:8px;padding:8px 16px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;}
.empty{text-align:center;color:var(--mut);padding:40px 20px;font-size:14px;}
.empi{font-size:40px;margin-bottom:12px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:white;padding:10px 24px;border-radius:50px;font-size:14px;font-weight:500;opacity:0;transition:all 0.3s;z-index:300;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.gld{background:var(--gold);color:#1a1000;}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-top"><div class="logo">MUZIO ENTRENA</div><div class="dbadge" id="db"></div></div></div>
<div class="tabs" id="tabs"></div>
<div class="main">
  <div class="wkout" id="wkout"></div>
  <div class="vhide" id="vHist"></div>
  <div class="vhide" id="vProg"></div>
  <div class="vhide" id="vStats"></div>
  <div class="vhide" id="vBody"></div>
</div>
<button class="savebtn" id="savebtn" onclick="saveSession()">Guardar sesion</button>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
var R={
"Torso 1":{sections:[
  {name:"Pecho + Espalda",exercises:[
    {name:"Pecho plano con barra",series:3,reps:"6-10",note:"Superserie con Dominadas"},
    {name:"Dominadas",series:4,reps:"6-10",note:"Superserie con Pecho plano",bw:true},
    {name:"Pecho inclinado con mancuerna",series:3,reps:"6-10",note:"Superserie con Remo"},
    {name:"Remo con barra",series:4,reps:"6-10",note:"Superserie con Pecho inclinado"}
  ]},
  {name:"Hombro",exercises:[
    {name:"Press militar",series:4,reps:"8-12",note:""},
    {name:"Hombro posterior",series:3,reps:"12-15",note:""}
  ]},
  {name:"Brazos",exercises:[
    {name:"Biceps banco inclinado",series:2,reps:"10-15",note:""},
    {name:"Biceps mancuerna normal",series:2,reps:"10-15",note:""},
    {name:"Triceps trasnuca",series:2,reps:"10-15",note:""},
    {name:"Press frances",series:2,reps:"10-15",note:""}
  ]}
]},
"Torso 2":{sections:[
  {name:"Pecho + Espalda",exercises:[
    {name:"Pecho plano con mancuerna",series:3,reps:"6-10",note:"Superserie con Dominadas"},
    {name:"Dominadas",series:4,reps:"6-10",note:"Superserie con Pecho plano",bw:true},
    {name:"Pecho inclinado con barra",series:3,reps:"6-10",note:"Superserie con Remo"},
    {name:"Remo unilateral",series:4,reps:"6-10",note:"Superserie con Pecho inclinado"}
  ]},
  {name:"Hombro",exercises:[
    {name:"Press militar",series:4,reps:"8-12",note:""},
    {name:"Hombro posterior",series:3,reps:"12-15",note:""}
  ]},
  {name:"Brazos",exercises:[
    {name:"Biceps banco inclinado",series:2,reps:"10-15",note:""},
    {name:"Biceps con barra",series:2,reps:"10-15",note:""},
    {name:"Triceps trasnuca",series:2,reps:"10-15",note:""},
    {name:"Extension de triceps",series:2,reps:"10-15",note:""}
  ]}
]},
"Piernas 1":{sections:[
  {name:"Cuadriceps",exercises:[
    {name:"Sentadilla",series:4,reps:"6-10",note:""},
    {name:"Sentadilla bulgara",series:4,reps:"8-12",note:""}
  ]},
  {name:"Hombro y Trapecio",exercises:[
    {name:"Vuelos laterales",series:3,reps:"12-15",note:""},
    {name:"Trapecio",series:3,reps:"12-15",note:""}
  ]},
  {name:"Abdominales",exercises:[
    {name:"Colgados en barra",series:3,reps:"Al fallo",note:"Extension > rodillas > elastico"},
    {name:"Hachazo oblicuo en polea",series:3,reps:"Al fallo",note:""}
  ]},
  {name:"Gemelos y Cuello",exercises:[
    {name:"Gemelos con barra en escalon",series:4,reps:"12-15",note:""},
    {name:"Cuello boca abajo",series:2,reps:"15-20",note:""},
    {name:"Cuello boca arriba",series:2,reps:"15-20",note:""}
  ]}
]},
"Piernas 2":{sections:[
  {name:"Posterior de pierna",exercises:[
    {name:"Peso muerto convencional",series:4,reps:"6-10",note:"Desde el rack"},
    {name:"Peso muerto rumano",series:4,reps:"8-12",note:"Bisagra de cadera"}
  ]},
  {name:"Hombro y Trapecio",exercises:[
    {name:"Vuelos laterales",series:3,reps:"12-15",note:""},
    {name:"Trapecio",series:3,reps:"12-15",note:""}
  ]},
  {name:"Abdominales",exercises:[
    {name:"Colgados en barra",series:3,reps:"Al fallo",note:"Extension > rodillas > elastico"},
    {name:"Hachazo oblicuo en polea",series:3,reps:"Al fallo",note:""}
  ]},
  {name:"Gemelos y Cuello",exercises:[
    {name:"Gemelos con barra en escalon",series:4,reps:"12-15",note:""},
    {name:"Cuello lateral",series:2,reps:"15-20",note:"Cada lado"}
  ]}
]}
};

var VT={"Pecho":12,"Espalda":16,"Biceps":8,"Triceps":8,"Hombro":14,"Cuadriceps":8,"Posterior":8,"Gemelos":8,"Abdominales":12};
var EM={"Pecho plano con barra":"Pecho","Pecho plano con mancuerna":"Pecho","Pecho inclinado con mancuerna":"Pecho","Pecho inclinado con barra":"Pecho","Dominadas":"Espalda","Remo con barra":"Espalda","Remo unilateral":"Espalda","Biceps banco inclinado":"Biceps","Biceps mancuerna normal":"Biceps","Biceps con barra":"Biceps","Triceps trasnuca":"Triceps","Press frances":"Triceps","Extension de triceps":"Triceps","Press militar":"Hombro","Hombro posterior":"Hombro","Vuelos laterales":"Hombro","Trapecio":"Hombro","Sentadilla":"Cuadriceps","Sentadilla bulgara":"Cuadriceps","Peso muerto convencional":"Posterior","Peso muerto rumano":"Posterior","Gemelos con barra en escalon":"Gemelos","Colgados en barra":"Abdominales","Hachazo oblicuo en polea":"Abdominales"};

var TABS=[{k:"Torso 1",l:"Torso 1"},{k:"Torso 2",l:"Torso 2"},{k:"Piernas 1",l:"Piernas 1"},{k:"Piernas 2",l:"Piernas 2"},{k:"hist",l:"Historial"},{k:"prog",l:"Progreso"},{k:"stats",l:"Habitos"},{k:"body",l:"Peso"}];
var cDay="Torso 1",cView="workout",charts={},tmrI={},tmrT={},doneChk={},extraS={};

function gH(){try{return JSON.parse(localStorage.getItem("mh")||"{}");}catch{return {};}}
function sH(h){localStorage.setItem("mh",JSON.stringify(h));}
function gBW(){try{return JSON.parse(localStorage.getItem("mbw")||"[]");}catch{return [];}}
function sBW(b){localStorage.setItem("mbw",JSON.stringify(b));}
function pw(v){if(!v)return 0;return parseFloat(v.toString().replace(",","."))||0;}

function getPR(n){
  var best=0;
  Object.values(gH()).forEach(function(s){if(s[n])s[n].forEach(function(r){var w=pw(r.weight);if(w>best)best=w;});});
  return best;
}

function getLS(dk){
  var h=gH(),today=new Date().toISOString().split("T")[0];
  var fe=R[dk].sections[0].exercises[0].name;
  var dates=Object.keys(h).filter(function(d){
    var s=h[d];
    return s._day===dk||(s[fe]&&s[fe].length>0);
  }).sort().reverse();
  // exclude today unless its the only entry
  var notToday=dates.filter(function(d){return d!==today;});
  var use=notToday.length>0?notToday:dates;
  return use.length?{date:use[0],data:h[use[0]]}:null;
}

function rTabs(){
  document.getElementById("tabs").innerHTML=TABS.map(function(t){
    var active=(cView==="workout"&&t.k===cDay)||(cView!=="workout"&&t.k===cView);
    return '<div class="tab'+(active?" active":"")+'" onclick="selTab(\''+t.k+'\')">'+t.l+"</div>";
  }).join("");
}

function selTab(k){
  dCharts();
  var wds=["Torso 1","Torso 2","Piernas 1","Piernas 2"];
  document.getElementById("wkout").classList.remove("hide");
  ["vHist","vProg","vStats","vBody"].forEach(function(v){document.getElementById(v).classList.remove("on");});
  if(wds.indexOf(k)>=0){
    cView="workout";cDay=k;
    document.getElementById("savebtn").style.display="block";
    rWorkout();
  } else {
    cView=k;
    document.getElementById("wkout").classList.add("hide");
    document.getElementById("savebtn").style.display="none";
    if(k==="hist"){document.getElementById("vHist").classList.add("on");rHist();}
    if(k==="prog"){document.getElementById("vProg").classList.add("on");rProg();}
    if(k==="stats"){document.getElementById("vStats").classList.add("on");rStats();}
    if(k==="body"){document.getElementById("vBody").classList.add("on");rBody();}
  }
  rTabs();
}

function dCharts(){Object.values(charts).forEach(function(c){try{c.destroy();}catch{}});charts={};}

function rWorkout(){
  doneChk={};extraS={};
  var day=R[cDay],last=getLS(cDay),exIdx=0;
  var html='<div class="dh">'+cDay.toUpperCase()+'</div>';
  html+='<div class="ds">'+day.sections.map(function(s){return s.name;}).join(" · ")+"</div>";
  day.sections.forEach(function(sec){
    html+='<div class="slbl">'+sec.name+"</div>";
    sec.exercises.forEach(function(ex){
      var idx=exIdx++,pr=getPR(ex.name);
      var lastData=last&&last.data[ex.name]?last.data[ex.name]:null;
      html+=bldCard(ex,idx,pr,lastData);
    });
  });
  document.getElementById("wkout").innerHTML=html;
  restoreTodayData();
}

function restoreTodayData(){
  var h=gH(),today=new Date().toISOString().split("T")[0];
  var todaySess=h[today];
  if(!todaySess||todaySess._day!==cDay)return;
  var idx=0;
  R[cDay].sections.forEach(function(sec){
    sec.exercises.forEach(function(ex){
      var series=todaySess[ex.name];
      if(series){
        series.forEach(function(s,si){
          var we=document.getElementById("w_"+idx+"_"+si);
          var re=document.getElementById("r_"+idx+"_"+si);
          if(we&&s.weight&&s.weight!=="0")we.value=s.weight;
          if(re&&s.reps&&s.reps!=="0")re.value=s.reps;
          if(s.ds){
            var dwe=document.getElementById("dsw_"+idx+"_"+si);
            var dre=document.getElementById("dsr_"+idx+"_"+si);
            if(dwe)dwe.value=s.ds.weight;
            if(dre)dre.value=s.ds.reps;
            var dsRow=document.getElementById("ds_"+idx+"_"+si);
            var dsBtn=document.getElementById("dsb_"+idx+"_"+si);
            if(dsRow){dsRow.style.display="flex";}
            if(dsBtn){dsBtn.classList.add("on");}
          }
        });
      }
      idx++;
    });
  });
}

function bldCard(ex,idx,pr,lastData){
  var rows="";
  for(var si=0;si<ex.series;si++){
    var ls=lastData&&lastData[si]?lastData[si]:null;
    var hint=ls?(ex.bw&&pw(ls.weight)===0?"PC x "+ls.reps+" reps":ls.weight+"kg x "+ls.reps+" reps"):null;
    rows+='<div class="sblk" id="sb_'+idx+"_"+si+'">';
    rows+='<div class="srow">';
    rows+='<div class="snum">'+(si+1)+"</div>";
    rows+='<div class="sig">';
    rows+='<input class="si" type="text" inputmode="decimal" placeholder="'+(hint||(ex.bw?"PC":"kg"))+'" id="w_'+idx+"_"+si+'" onchange="chkPR('+idx+",'"+ex.name+"')"+"\">";
    rows+='<span class="slb">kg</span>';
    rows+='<input class="si" type="text" inputmode="numeric" placeholder="reps" id="r_'+idx+"_"+si+'" onchange="autoSave()">';
    rows+='<span class="slb">reps</span>';
    rows+="</div>";
    rows+='<button class="dsbtn" id="dsb_'+idx+"_"+si+'" onclick="tDS('+idx+","+si+')">DS</button>';
    rows+='<div class="schk" id="chk_'+idx+"_"+si+'" onclick="mSerie('+idx+","+si+","+ex.series+')">&#10003;</div>';
    rows+="</div>";
    if(hint)rows+='<div class="lhint">Ultima vez: <span>'+hint+"</span></div>";
    rows+='<div class="dsrow" id="ds_'+idx+"_"+si+'" style="display:none">';
    rows+='<div class="dslb">DS</div>';
    rows+='<div class="sig">';
    rows+='<input class="si" type="text" inputmode="decimal" placeholder="kg" id="dsw_'+idx+"_"+si+'" onchange="autoSave()">';
    rows+='<span class="slb">kg</span>';
    rows+='<input class="si" type="text" inputmode="numeric" placeholder="reps" id="dsr_'+idx+"_"+si+'" onchange="autoSave()">';
    rows+='<span class="slb">reps</span>';
    rows+="</div></div></div>";
  }
  var card='<div class="ecard" id="card_'+idx+'">';
  card+='<div class="ehdr" onclick="tEx('+idx+')">';
  card+='<div class="cdot"></div>';
  card+='<div style="flex:1"><div class="ename">'+ex.name+(pr>0?'<span class="prbdg">PR '+pr+'kg</span>':"")+"</div>";
  card+='<div class="emeta">'+ex.series+" series &middot; "+ex.reps+" reps"+(ex.note?" &middot; "+ex.note:"")+"</div></div>";
  card+='<div class="etgl">&#9662;</div></div>';
  card+='<div class="scon" id="sc_'+idx+'">'+rows;
  card+='<button class="addbtn" onclick="addExtra('+idx+')">+ Serie extra</button>';
  card+="</div></div>";
  return card;
}

function tEx(i){document.getElementById("card_"+i).classList.toggle("open");}

function tDS(i,si){
  var d=document.getElementById("ds_"+i+"_"+si),b=document.getElementById("dsb_"+i+"_"+si);
  var h=d.style.display==="none";
  d.style.display=h?"flex":"none";
  b.classList.toggle("on",h);
}

function addExtra(idx){
  extraS[idx]=(extraS[idx]||0)+1;
  var si=0;
  var day=R[cDay];var ex=null;var ei=0;
  day.sections.forEach(function(sec){sec.exercises.forEach(function(e){if(ei===idx)ex=e;ei++;});});
  if(!ex)return;
  si=ex.series+(extraS[idx]-1);
  var blk=document.createElement("div");
  blk.innerHTML='<div class="sblk" id="sb_'+idx+"_"+si+'">'
    +'<div class="srow"><div class="snum ex">+</div>'
    +'<div class="sig"><input class="si" type="text" inputmode="decimal" placeholder="kg" id="w_'+idx+"_"+si+'" onchange="chkPR('+idx+",'"+ex.name+"')\">"
    +'<span class="slb">kg</span>'
    +'<input class="si" type="text" inputmode="numeric" placeholder="reps" id="r_'+idx+"_"+si+'" onchange="autoSave()">'
    +'<span class="slb">reps</span></div>'
    +'<button class="dsbtn" id="dsb_'+idx+"_"+si+'" onclick="tDS('+idx+","+si+')">DS</button>'
    +'<div class="schk" id="chk_'+idx+"_"+si+'" onclick="mSerie('+idx+","+si+',999)">&#10003;</div></div>'
    +'<div class="dsrow" id="ds_'+idx+"_"+si+'" style="display:none"><div class="dslb">DS</div>'
    +'<div class="sig"><input class="si" type="text" inputmode="decimal" placeholder="kg" id="dsw_'+idx+"_"+si+'" onchange="autoSave()">'
    +'<span class="slb">kg</span>'
    +'<input class="si" type="text" inputmode="numeric" placeholder="reps" id="dsr_'+idx+"_"+si+'" onchange="autoSave()">'
    +'<span class="slb">reps</span></div></div></div>';
  var sc=document.getElementById("sc_"+idx);
  var ab=sc.querySelector(".addbtn");
  sc.insertBefore(blk.firstElementChild,ab);
}

function mSerie(idx,si,total){
  var key=idx+"_"+si;
  doneChk[key]=!doneChk[key];
  document.getElementById("chk_"+idx+"_"+si).classList.toggle("done",doneChk[key]);
  var day=R[cDay];var ex=null;var ei=0;
  day.sections.forEach(function(sec){sec.exercises.forEach(function(e){if(ei===idx)ex=e;ei++;});});
  var base=ex?ex.series:total;
  var all=true;
  for(var i=0;i<base;i++){if(!doneChk[idx+"_"+i]){all=false;break;}}
  document.getElementById("card_"+idx).classList.toggle("complete",all);
  if(doneChk[key])sTmr(idx);else stTmr(idx);
}

function sTmr(idx){
  stTmr(idx);tmrT[idx]=120;
  var sc=document.getElementById("sc_"+idx);
  var te=document.getElementById("rt_"+idx);
  if(!te){
    var d=document.createElement("div");
    d.className="rtmr on";d.id="rt_"+idx;
    d.innerHTML='<div><div class="tlbl">Descanso</div><div class="tdisp" id="td_'+idx+'">2:00</div></div>'
      +'<div class="tbtns"><div class="tbtn" onclick="aTime('+idx+',30)">+30s</div>'
      +'<div class="tbtn stop" onclick="stTmr('+idx+')">&#10005;</div></div>';
    var ab=sc.querySelector(".addbtn");
    sc.insertBefore(d,ab);
  } else te.classList.add("on");
  tmrI[idx]=setInterval(function(){
    tmrT[idx]--;uTD(idx);
    if(tmrT[idx]<=0){stTmr(idx);toast("A la siguiente serie!");}
  },1000);
  uTD(idx);
}
function stTmr(idx){clearInterval(tmrI[idx]);var e=document.getElementById("rt_"+idx);if(e)e.classList.remove("on");}
function aTime(idx,s){tmrT[idx]=(tmrT[idx]||0)+s;uTD(idx);}
function uTD(idx){var t=tmrT[idx]||0,m=Math.floor(t/60),s=t%60;var e=document.getElementById("td_"+idx);if(e)e.textContent=m+":"+(s<10?"0":"")+s;}

function chkPR(idx,name){
  var pr=getPR(name),mx=0;
  for(var si=0;si<30;si++){var e=document.getElementById("w_"+idx+"_"+si);if(!e)break;var v=pw(e.value);if(v>mx)mx=v;}
  var card=document.getElementById("card_"+idx);
  if(mx>pr&&pr>0){card.classList.add("pr-alert");toast("Nuevo record personal!",true);}
  else card.classList.remove("pr-alert");
  autoSave();
}

function autoSave(){
  var h=gH(),today=new Date().toISOString().split("T")[0];
  if(!h[today])h[today]={};
  h[today]._day=cDay;
  var idx=0;
  R[cDay].sections.forEach(function(sec){
    sec.exercises.forEach(function(ex){
      var series=[],total=ex.series+(extraS[idx]||0);
      for(var si=0;si<total;si++){
        var we=document.getElementById("w_"+idx+"_"+si);
        var re=document.getElementById("r_"+idx+"_"+si);
        var dwe=document.getElementById("dsw_"+idx+"_"+si);
        var dre=document.getElementById("dsr_"+idx+"_"+si);
        var wv=we?we.value.replace(",","."):"";
        var rv=re?re.value:"";
        if(wv||rv){
          var entry={weight:wv||"0",reps:rv||"0"};
          if(dwe&&dre&&(dwe.value||dre.value))entry.ds={weight:dwe.value.replace(",","."),reps:dre.value};
          series.push(entry);
        }
      }
      if(series.length)h[today][ex.name]=series;
      idx++;
    });
  });
  sH(h);
}

function saveSession(){
  autoSave();
  toast("Sesion guardada");
}

function rHist(){
  var h=gH();
  var dates=Object.keys(h).filter(function(d){return h[d]._day;}).sort().reverse();
  var v=document.getElementById("vHist");
  if(!dates.length){v.innerHTML='<div class="empty"><div class="empi">&#128193;</div>No hay sesiones guardadas</div>';return;}
  var html='<div class="slbl">Sesiones guardadas</div>';
  dates.forEach(function(date,di){
    var sess=h[date];
    var day=sess._day||"";
    var exNames=Object.keys(sess).filter(function(k){return k.charAt(0)!=="_";});
    var exHtml="";
    exNames.forEach(function(exName){
      var series=sess[exName];
      var safe=exName.replace(/[^a-zA-Z0-9]/g,"_");
      var srows="";
      series.forEach(function(s,si){
        srows+='<div class="hsr">';
        srows+='<div class="hsn">'+(si+1)+"</div>";
        srows+='<input class="hinp" type="text" value="'+s.weight+'" id="he_'+di+"_"+safe+"_"+si+'_w">';
        srows+='<span style="font-size:11px;color:var(--mut)">kg</span>';
        srows+='<input class="hinp" type="text" value="'+s.reps+'" id="he_'+di+"_"+safe+"_"+si+'_r">';
        srows+='<span style="font-size:11px;color:var(--mut)">reps</span>';
        srows+="</div>";
      });
      exHtml+='<div class="hex"><div class="hexn">'+exName+"</div>"+srows+"</div>";
    });
    html+='<div class="hsess" id="hs_'+di+'">';
    html+='<div class="hsesshdr" onclick="tHS('+di+')">';
    html+='<div><div class="hsessdate">'+date+"</div>";
    html+='<div class="hsessday">'+day+" &middot; "+exNames.length+" ejercicios</div></div>";
    html+='<div class="etgl">&#9662;</div></div>';
    html+='<div class="hsessbody">'+exHtml;
    html+='<div class="hact">';
    html+='<button class="hsavebtn" onclick="saveEdit(\''+date+'\','+di+')">Guardar cambios</button>';
    html+='<button class="hdelbtn" onclick="delSess(\''+date+'\')">Borrar</button>';
    html+="</div></div></div>";
  });
  v.innerHTML=html;
}

function tHS(di){document.getElementById("hs_"+di).classList.toggle("open");}

function saveEdit(date,di){
  var h=gH(),sess=h[date];
  var exNames=Object.keys(sess).filter(function(k){return k.charAt(0)!=="_";});
  exNames.forEach(function(exName){
    var safe=exName.replace(/[^a-zA-Z0-9]/g,"_");
    sess[exName].forEach(function(s,si){
      var we=document.getElementById("he_"+di+"_"+safe+"_"+si+"_w");
      var re=document.getElementById("he_"+di+"_"+safe+"_"+si+"_r");
      if(we)s.weight=we.value.replace(",",".");
      if(re)s.reps=re.value;
    });
  });
  sH(h);toast("Sesion actualizada");
}

function delSess(date){
  if(!confirm("Borrar sesion del "+date+"?"))return;
  var h=gH();delete h[date];sH(h);
  toast("Sesion borrada");rHist();
}

function rProg(){
  var allEx=new Set();
  Object.values(R).forEach(function(d){d.sections.forEach(function(s){s.exercises.forEach(function(e){allEx.add(e.name);});});});
  var opts='<option value="">Selecciona ejercicio...</option>';
  allEx.forEach(function(n){opts+='<option value="'+n+'">'+n+"</option>";});
  document.getElementById("vProg").innerHTML='<div class="slbl">Progreso por ejercicio</div><select class="psel" id="psel" onchange="rProgChart()">'+opts+"</select><div id='pca'></div><div id='pcmp'></div>";
}

function rProgChart(){
  var name=document.getElementById("psel").value;
  var ca=document.getElementById("pca"),cmp=document.getElementById("pcmp");
  if(!name){ca.innerHTML="";cmp.innerHTML="";return;}
  var h=gH(),entries=[];
  Object.keys(h).sort().forEach(function(date){
    var sess=h[date];
    if(sess[name]){
      var mx=Math.max.apply(null,sess[name].map(function(s){return pw(s.weight);}));
      var tr=sess[name].reduce(function(a,s){return a+(parseInt(s.reps)||0);},0);
      if(mx>0||tr>0)entries.push({date:date,mx:mx,series:sess[name],tr:tr});
    }
  });
  if(!entries.length){ca.innerHTML='<div class="empty"><div class="empi">&#127947;</div>Sin registros</div>';cmp.innerHTML="";return;}
  var hiHtml=entries.slice().reverse().map(function(e){
    var wstr=e.mx>0?e.mx+"kg":"PC";
    return "<div class='hi'><div><div class='hdate'>"+e.date+"</div><div style='font-size:11px;color:var(--mut)'>"+e.series.length+" series &middot; "+e.tr+" reps</div></div><div class='hdata'>"+wstr+"</div></div>";
  }).join("");
  ca.innerHTML='<div class="chrt"><div class="chtl">Peso maximo (kg)</div><canvas id="pc" height="180"></canvas></div><div class="slbl">Historial</div>'+hiHtml;
  var valid=entries.filter(function(e){return e.mx>0;});
  if(valid.length>0){
    if(charts.p)try{charts.p.destroy();}catch{}
    charts.p=new Chart(document.getElementById("pc").getContext("2d"),{
      type:"line",
      data:{labels:valid.map(function(e){return e.date.slice(5);}),datasets:[{data:valid.map(function(e){return e.mx;}),borderColor:"#6aab7a",backgroundColor:"rgba(106,171,122,0.15)",borderWidth:2.5,pointBackgroundColor:"#6aab7a",pointRadius:5,tension:0.3,fill:true}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#7a997a",font:{size:11}},grid:{color:"#2a3e2a"}},y:{ticks:{color:"#7a997a",font:{size:11}},grid:{color:"#2a3e2a"}}}}
    });
  }
  if(entries.length>=2){
    var last=entries[entries.length-1],prev=entries[entries.length-2];
    var diff=Math.round((last.mx-prev.mx)*10)/10;
    var dc=diff>0?"up":diff<0?"dn":"eq";
    var dt=diff>0?"▲ +"+diff+"kg":diff<0?"▼ "+diff+"kg":"= Sin cambio";
    cmp.innerHTML='<div class="slbl">Comparacion ultimas 2 sesiones</div><div class="cgrid"><div class="ccard"><div class="cdate">'+prev.date+'</div><div class="cval">'+(prev.mx>0?prev.mx+"kg":"PC")+'</div><div style="font-size:11px;color:var(--mut)">'+prev.series.length+' series</div></div><div class="ccard"><div class="cdate">'+last.date+' <span style="color:var(--gl);font-size:10px">ULTIMA</span></div><div class="cval">'+(last.mx>0?last.mx+"kg":"PC")+'</div><div class="cdiff '+dc+'">'+dt+"</div></div></div>";
  } else cmp.innerHTML="";
}

function gWVol(){
  var h=gH(),vol={};
  Object.keys(VT).forEach(function(k){vol[k]=0;});
  var ws=new Date();ws.setDate(ws.getDate()-ws.getDay());
  var wsStr=ws.toISOString().split("T")[0];
  Object.keys(h).forEach(function(d){
    if(d>=wsStr){
      Object.keys(h[d]).forEach(function(n){
        if(n.charAt(0)==="_")return;
        var m=EM[n];if(m&&vol[m]!==undefined)vol[m]+=h[d][n].length;
      });
    }
  });
  return vol;
}

function rStats(){
  var h=gH(),dates=Object.keys(h).filter(function(d){return h[d]._day;}).sort();
  var total=dates.length;
  var dc={"Torso 1":0,"Torso 2":0,"Piernas 1":0,"Piernas 2":0};
  dates.forEach(function(d){if(dc[h[d]._day]!==undefined)dc[h[d]._day]++;});
  var maxC=Math.max.apply(null,Object.values(dc).concat([1]));
  var today=new Date();
  var streak=0,rev=dates.slice().reverse();
  for(var i=0;i<rev.length;i++){var exp=new Date(today);exp.setDate(today.getDate()-i);if(rev[i]===exp.toISOString().split("T")[0])streak++;else break;}
  var d35=[];
  for(var j=34;j>=0;j--){var d=new Date(today);d.setDate(today.getDate()-j);var k=d.toISOString().split("T")[0];d35.push({k:k,n:d.getDate(),tr:!!h[k],tp:h[k]?h[k]._day:null});}
  var dow=["D","L","M","M","J","V","S"],sdow=new Date(d35[0].k).getDay();
  var wv=gWVol();
  var html='<div class="slbl">Racha y totales</div>';
  html+='<div class="sgrid"><div class="scard"><div class="sval">'+total+'</div><div class="slb2">Entrenamientos</div></div>';
  html+='<div class="scard"><div class="sval">'+streak+'</div><div class="slb2">Dias seguidos</div></div></div>';
  html+='<div class="slbl">Ultimos 35 dias</div>';
  html+='<div class="mlbl">'+dow.map(function(l){return '<div class="ml">'+l+"</div>";}).join("")+"</div>";
  html+='<div class="hgrid">';
  for(var x=0;x<sdow;x++)html+="<div></div>";
  d35.forEach(function(d){html+='<div class="hday'+(d.tr?" tr":"")+'"><span class="hdn">'+d.n+"</span>"+(d.tp?'<span class="hdt">'+d.tp.replace(" ","").substring(0,4)+"</span>":"")+"</div>";});
  html+="</div>";
  html+='<div class="slbl">Series esta semana</div>';
  Object.keys(VT).forEach(function(muscle){
    var done=wv[muscle]||0,target=VT[muscle];
    var pct=Math.min((done/target)*100,100),ok=done>=target;
    html+='<div class="vrow"><div class="vrt"><div class="vrn">'+muscle+'</div><div class="vrc '+(ok?"ok":"lo")+'">'+done+"/"+target+' series</div></div><div class="vbw"><div class="vb '+(ok?"ok":"lo")+'" style="width:'+pct+'%"></div></div></div>';
  });
  html+='<div class="slbl">Veces por dia de rutina</div>';
  Object.keys(dc).forEach(function(day){
    var count=dc[day];
    html+='<div class="dfrow"><div style="flex:1"><div class="dfn">'+day+'</div><div class="dfbw"><div class="dfb" style="width:'+(count/maxC*100)+'%"></div></div></div><div class="dfc">'+count+"x</div></div>";
  });
  document.getElementById("vStats").innerHTML=html;
}

function rBody(){
  document.getElementById("vBody").innerHTML='<div class="slbl">Registrar peso corporal</div><div class="wrow"><input class="winp" type="text" inputmode="decimal" id="bwi" placeholder="69.5"><button class="wsbtn" onclick="saveBW()">Guardar</button></div><div id="bwca"></div><div class="slbl">Historial</div><div id="bwhi"></div>';
  rBWChart();
}

function saveBW(){
  var raw=document.getElementById("bwi").value.replace(",",".");
  var val=parseFloat(raw);
  if(!val||val<30||val>200){toast("Peso invalido");return;}
  var bw=gBW(),today=new Date().toISOString().split("T")[0];
  var ei=bw.findIndex(function(e){return e.date===today;});
  if(ei>=0)bw[ei].weight=val;else bw.push({date:today,weight:val});
  bw.sort(function(a,b){return a.date.localeCompare(b.date);});
  sBW(bw);document.getElementById("bwi").value="";toast("Peso guardado");rBWChart();
}

function rBWChart(){
  var bw=gBW(),ca=document.getElementById("bwca"),hi=document.getElementById("bwhi");
  if(!bw.length){ca.innerHTML='<div class="empty"><div class="empi">&#9878;</div>Registra tu primer peso</div>';hi.innerHTML="";return;}
  ca.innerHTML='<div class="chrt"><div class="chtl">Peso corporal (kg)</div><canvas id="bwc" height="180"></canvas></div>';
  if(charts.bw)try{charts.bw.destroy();}catch{}
  charts.bw=new Chart(document.getElementById("bwc").getContext("2d"),{
    type:"line",
    data:{labels:bw.map(function(e){return e.date.slice(5);}),datasets:[{data:bw.map(function(e){return e.weight;}),borderColor:"#a8e6b8",backgroundColor:"rgba(168,230,184,0.15)",borderWidth:2.5,pointBackgroundColor:"#a8e6b8",pointRadius:5,tension:0.3,fill:true}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#7a997a",font:{size:11}},grid:{color:"#2a3e2a"}},y:{ticks:{color:"#7a997a",font:{size:11}},grid:{color:"#2a3e2a"}}}}
  });
  hi.innerHTML=bw.slice().reverse().map(function(e){return "<div class='hi'><div class='hdate'>"+e.date+"</div><div class='hdata'>"+e.weight+" kg</div></div>";}).join("");
}

function toast(msg,gold){
  var t=document.getElementById("toast");
  t.textContent=msg;t.className="toast on"+(gold?" gld":"");
  setTimeout(function(){t.className="toast";},2800);
}

document.getElementById("db").textContent=new Date().toLocaleDateString("es-AR",{weekday:"short",day:"numeric",month:"short"});
rTabs();rWorkout();
</script>
